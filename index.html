<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Esperienza VR - Arco di Costantino</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

    <script>
      AFRAME.registerComponent('interazione-giulia', {
        init: function () {
          var testoDaLeggere = "L'Arco di Costantino fu eretto nel 315 dopo Cristo per celebrare la vittoria a Ponte Milvio. Molte delle sue statue furono riciclate da monumenti romani più antichi!";

          // Mettiamo in ascolto il tasto 'A' (abuttondown)
          this.el.addEventListener('abuttondown', function () {
            // Ora 'this.el' è direttamente il controller destro
            var raycaster = this.components.raycaster;
            
            if (raycaster && raycaster.intersectedEls.length > 0) {
              var oggettiPuntati = raycaster.intersectedEls;
              
              for (var i = 0; i < oggettiPuntati.length; i++) {
                // Se il laser sta toccando Giulia
                if (oggettiPuntati[i].id === 'modello-giulia') {
                  
                  // Ferma l'audio se stava già parlando
                  window.speechSynthesis.cancel();

                  // Avvia la nuova lettura
                  var discorso = new SpeechSynthesisUtterance(testoDaLeggere);
                  discorso.lang = 'it-IT';
                  discorso.pitch = 1.2;
                  discorso.rate = 0.95;
                  
                  window.speechSynthesis.speak(discorso);
                  break;
                }
              }
            }
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <a-asset-item id="modello-arco" src="arco.glb"></a-asset-item>
        <a-asset-item id="modello-giulia" src="giulia3d.glb"></a-asset-item>
      </a-assets>

      <a-entity gltf-model="#modello-arco" position="0 0.5 -10" scale="1 1 1"></a-entity>

      <a-entity id="modello-giulia" class="interattiva" gltf-model="#modello-giulia" position="0 0 -2" scale="0.8 0.8 0.8" rotation="0 0 0"></a-entity>

      <a-sky color="#87CEEB"></a-sky>

      <a-entity id="rig" movement-controls="speed: 0.15" position="0 0 4">
        
        <a-camera position="0 1.6 0" look-controls="pointerLockEnabled: false">
          <a-cursor></a-cursor>
        </a-camera>

        <a-entity id="mano-sinistra" oculus-touch-controls="hand: left"></a-entity>
        
        <a-entity id="mano-destra" 
                  laser-controls="hand: right" 
                  raycaster="objects: .interattiva" 
                  oculus-touch-controls="hand: right" 
                  interazione-giulia>
        </a-entity>
        
      </a-entity>
    </a-scene>
  </body>
</html>
