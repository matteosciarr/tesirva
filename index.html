<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Esperienza VR - Arco di Costantino e Acquedotto</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

    <script>
      AFRAME.registerComponent('parla', {
        init: function () {
          var sorgenteAudio = document.querySelector('#audio-giulia');
          this.el.addEventListener('click', function () {
            sorgenteAudio.components.sound.stopSound();
            sorgenteAudio.components.sound.playSound();
          });
        }
      });

      // STRUMENTO DI DEBUG: premi 1 = arco, 2 = giulia, 3 = acquedotto
      // poi Freccia SU / Freccia GIÙ per alzare/abbassare l'oggetto selezionato di 5cm alla volta.
      // I valori aggiornati vengono stampati in console (F12 > Console).
      window.addEventListener('DOMContentLoaded', function () {
        var selezionato = null;
        var mappa = {
          '1': '#entita-arco',
          '2': '#entita-giulia',
          '3': '#entita-acquedotto'
        };

        window.addEventListener('keydown', function (e) {
          if (mappa[e.key]) {
            selezionato = document.querySelector(mappa[e.key]);
            console.log('Selezionato:', mappa[e.key]);
          }
          if (!selezionato) return;

          var pos = selezionato.getAttribute('position');
          var passo = 0.05; // 5 cm per pressione

          if (e.key === 'ArrowUp') {
            selezionato.setAttribute('position', { x: pos.x, y: pos.y + passo, z: pos.z });
            console.log(selezionato.id, 'y =', (pos.y + passo).toFixed(2));
          }
          if (e.key === 'ArrowDown') {
            selezionato.setAttribute('position', { x: pos.x, y: pos.y - passo, z: pos.z });
            console.log(selezionato.id, 'y =', (pos.y - passo).toFixed(2));
          }
        });
      });
    </script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <a-asset-item id="modello-arco" src="arco.glb"></a-asset-item>
        <a-asset-item id="modello-giulia" src="giulia3d.glb"></a-asset-item>
        <a-asset-item id="modello-acquedotto" src="acquedotto.glb"></a-asset-item>
        <audio id="voce-mp3" src="voce.mp3" preload="auto"></audio>
      </a-assets>

      <!-- Pavimento infinito -->
      <a-plane
        position="0 0 0"
        rotation="-90 0 0"
        width="200"
        height="200"
        color="#b5a68f"
        shadow="receive: true">
      </a-plane>

      <!-- Arco di Costantino -->
      <a-entity
        id="entita-arco"
        gltf-model="#modello-arco"
        position="0 0.8 -10"
        scale="1 1 1">
      </a-entity>

      <!-- Acquedotto: valore y di partenza alzato, da regolare col debug -->
      <a-entity
        id="entita-acquedotto"
        gltf-model="#modello-acquedotto"
        position="-1.85 -1.1 -4"
        scale="2 2 2"
        rotation="0 70 0">
      </a-entity>

      <!-- Giulia: scala aumentata (era troppo piccola), y di partenza da regolare -->
      <a-entity position="0 0 -2">
        <a-entity
          id="entita-giulia"
          gltf-model="#modello-giulia"
          position="0 0 0"
          scale="1.7 1.7 1.7">
        </a-entity>
        <a-sound id="audio-giulia" src="#voce-mp3" autoplay="false" positional="true" volume="2"></a-sound>
        <a-cylinder class="interattiva" parla position="0 1 0" radius="0.5" height="2" material="opacity: 0.0; transparent: true"></a-cylinder>
      </a-entity>

      <!-- Rig del visitatore -->
      <a-entity id="rig" movement-controls="speed: 0.15" position="0 0 4">
        <a-camera position="0 1.6 0" look-controls="pointerLockEnabled: false">
          <a-cursor></a-cursor>
        </a-camera>

        <a-entity id="mano-sinistra" oculus-touch-controls="hand: left"></a-entity>
        <a-entity id="mano-destra" laser-controls="hand: right" raycaster="objects: .interattiva"></a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
